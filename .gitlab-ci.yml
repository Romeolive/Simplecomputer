image: registry.csc.sibsutis.ru/ci/git-clang-format:latest

stages:
  - check-format
  - build

check-format:
  stage: check-format
  script:
    - find . -type f \( -name "*.c" -o -name "*.h" \) -print0 | xargs -0 clang-format --style GNU -i --verbose
    - git diff --exit-code

build:
  stage: build
  script:
    - make
    